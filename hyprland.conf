#acutalizacino del entorno Systemd y D-bus
exec-once = dbus-update-activation-enviroment --system WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland

exec-once = "/home/djxs4n/Documentos/Programacion/quickshell/DJ-Shell/out/build/GCC 13.3.0 x86_64-linux-gnu/Dj-Shell"

#esta mare me permite ejecutar de inicio sww lo aprendi por las malas
