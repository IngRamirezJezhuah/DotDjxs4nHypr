#este pone el cursor de bocchi de primera

exec-once = hyprctl setcursor Bocchi-The-Cursor-Alt-Cross 24
#================================================
#           VARIABLES DE SISTEMA                |
#================================================

source = ~/.config/hypr-dj-shell/Config/env.conf

source = ~/.config/hypr-dj-shell/Config/execs-onces.conf

source = ~/.config/hypr-dj-shell/Config/Keybindings.conf

source = ~/.config/hypr-dj-shell/Config/ui.conf

source = ~/.config/hypr-dj-shell/Animations/animations.conf

source = ~/.config/hypr-dj-shell/Perfil-pantalla/monitores.conf



#================================================
# MODULOS Y CONFIGURACIONES EXTERNAS            |
#================================================
source = ~/.config/hypr-dj-shell/reglas/dj-shell.conf

#================================
#      ATAJOS DE TECLADO        |   
#================================

$mainMod = SUPER

#bind = $mainMod, Return, exec, kitty
#bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
#bind = $mainMod, B, exec, brave-browser
#bind = $mainMod, E, exec, thunar
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
#bind = $mainMod, D, exec, rofi -show drun

#==========================================================
#     GESTIÓN DE VENTANAS CON MOUSE (SUPER + CLIC)        |   
#==========================================================
# Mover ventanas flotantes con SUPER + Clic Izquierdo
bindm = $mainMod, mouse:272, movewindow

# Redimensionar ventanas con SUPER + Clic Derecho
bindm = $mainMod, mouse:273, resizewindow

#================================
#         WINDOWS-RULES         |   
#================================

#windowrulev2 = float, ^(Dj-Shell)$
#windowrulev2 = move 0 0, ^(Dj-Shell)$
#windowrulev2 = pin, ^(Dj-Shell)$
#windowrule = float; move 0 0; pin, class:^(Dj-Shell)$

#==========================================================
#        REGLAS DE VENTANA DEFINITIVAS (V2)               |   
#==========================================================

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(cba6f7)
    col.inactive_border = rgb(313244)
    layout = dwindle 
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

input {
    kb_layout = latam
    follow_mouse = 1
}

debug {
    disable_logs = true
    disable_time = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
