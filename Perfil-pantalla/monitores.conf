# Pantalla nativa de la laptop
# las de abajo son alternativas que son por defecto ↴ 
# monitor = eDP-1, preferred, auto, 1
# monitor = eDP-1, 1920x1080@144, 0x0, 1

monitor = eDP-1, 1920x1080@144, 0x0, 1

# Esta de abajo es para dejar espacio para la barra en qml↴

monitor = eDP-1, addreserved, 30, 0, 0, 0

# Monitor externo por HDMI (HDMI-A-1) ↴ 

monitor = HDMI-A-1, preferred, auto, 1 
