#================================================
#               ATAJOS DE TECLADO               |
#================================================

#  <- tux
$tux = SUPER

#==========================
#   VARIABLES Y SCRIPTS   |
#==========================

$SCRIP = $HOME/.config/hypr-dj-shell/Scriptsitos

#==============================
#       ATAJOS NORMALES       |
#==============================

bind = $tux, Return, exec, kitty
bind = $tux, Q, killactive, 
bind = $tux, E, exec, thunar
bind = $tux, D, exec, rofi -show drun 
#bind = $tux, exec, pkill rofi || true && rofi -show drun -modi drun, filebrowser,run,window
bind = $tux , S, exec, steam && notify-send -e -h string:x-canonical-private-synchronous:seam "Steam" "ejecutandose..."

#=============================
#          PANTALLA          |
#=============================

bind = $tux, SPACE, togglefloating,
#bind = $tux, ATL, SPACE, exec, hyprctl dispatch workspaceopt allfloat
#bind = $tux, SHIFT, Return, exec, $scriptcitos/Dropterminal.sh $term
bind = $tux, F, fullscreen,
#bind = $tux, CTR, F, maximize window, fullscreen, 1
bind = $tux, P, pseudo,
bind = $tux, B, exec, xdg-open "https://"

#============================
#  CARACTERISTICAS EXTRAS   |
#============================

bind = $tux, ALT, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bind = $tux, ALT, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')"

#================================
# TECLAS ESPECIALES / HOT KEYS  |
#  Usa fn para activarlos       |
#================================

bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.5  && notify-send -e -h string:x-canonical-private-synchronous:volume -u low -i audio-volume-high "Volumen:" "Subiendo audio ..."

bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- -l 1.5  && notify-send -e -h string:x-canonical-private-synchronous:volume -u low -i audio-volume-low "Volumen" "Bajando audio ..."

#bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && notify-send -e -h string:x-canonical-private-synchronous:mic "Microfono"  "desacivo"!="activo"  
# Esta chingadera abre la hoja de ayuda con la tecla de rog del teclado↴
bindr  = , XF886Launch, exec, /$SCRIP/rofi-help.sh

#=============================
# teclado y rendimiento      |
#     Del F1 a F5            |
#=============================

bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -e -h string:x-canonical-private-synchronous:volume "Audio" "Mute toggled" #f1

bindle = , XF86KbdBrightnessDown, exec, brightnessctl --device="asus::kbd_backlight" set 1- && notify-send -e -h string:x-canonical-private-synchronous:kbd_back "Teclado" "Brillo disminuido" #f2

bindle = , Xf86KbdBrightnessUp, exec, brightnessctl --device="asus::sbd_backlight" set 1+ && notify-send -e -h string:x-canonical-private-synchronous:kbd_back "Teclado" "Brillo aumentado" #f3
# f4 reservado para auro keyboard
bindl  = , XF86Launch4, exec, $SCRIP/toggle-performance.sh #f5

#=============================
# Brillo Pantala Red Sistema |
#       Del F7 a F12         |
#=============================

bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%- #f7
bindle = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+ #f8
bindl  = , XF86Display, exec, notify-send "pantalla" "Modo de Proyeccion" #f9
bindl  = , XF86TouchpadToggle, exec, $SCRIP/touchpad-toggle.sh #f10
bindl  = , XF86Sleep, exec, systemctl suspend #f11 (suspender)
bindl  = , XF86RFKill, exec, rfkill toggle all #f12 (modo avion)

#=============================
#  Teclas especiales Numpad  |
#       Del 1.. 9 + - / *    |
#=============================
# Mapeo de las teclas para trabajo rapido

bind = $tux , KP_Divide, exec, kitty --class floating-term -e btop # Numpad / abre btop
bind = $tux , KP_Multiply, exec, kitty --class floating-term -e python3 #num *abre python
bind = $tux , O, exec, hyprctl dispatch workspace -1 #num -
bind = $tux , P, exec, hyprctl dispatch workspace +1 #numpad +

